<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(135deg, #00c6ff, #007aff);
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.32);
      padding: 24px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      text-align: center;
      color: #111;
    }
    p {
      font-size: 14px;
      margin-bottom: 12px;
      text-align: center;
      color: #6b7280;
    }
    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      margin-top: 10px;
    }
    input, select, textarea {
      padding: 12px 14px;
      background: #fff;
      color: #111;
      border: 2px solid #d1d5db;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    button {
      padding: 12px 14px;
      background: linear-gradient(135deg, #00c6ff, #007aff);
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .row > * + * {
      margin-left: 8px;
    }
    .result {
      font-size: 38px;
      font-weight: 800;
      text-align: center;
      margin-top: 16px;
      color: #6b7280;
    }
    .stats {
      font-size: 16px;
      text-align: center;
      margin-top: 8px;
      color: #6b7280;
    }
    .controls {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }
    .control {
      margin: 0 8px;
    }
    .meta {
      text-align: center;
      margin-top: 12px;
      color: #6b7280;
      font-size: 14px;
    }
    ul {
      list-style: none;
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    li {
      padding: 12px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }
    canvas {
      width: 100%;
      height: 240px;
      background: #fff;
      border-radius: 18px;
      margin-top: 12px;
    }
    .debug {
      margin-top: 8px;
      font-size: 14px;
      text-align: center;
      color: #6b7280;
      display: none;
    }
    .guide {
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
      color: #6b7280;
    }
    .key {
      font-size: 14px;
      text-align: center;
      margin-top: 8px;
      color: #6b7280;
      display: none;
    }
    .copy {
      font-size: 14px;
      text-align: center;
      margin-top: 8px;
      color: #6b7280;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>番茄钟</h1>
    <p>25分钟工作5分钟休息</p>
    <div class="result" id="timer">25:00</div>
    <div class="stats">
      <div id="break">休息时间：5:00</div>
      <div id="session">工作时间：25:00</div>
      <div id="count">已工作：0</div>
    </div>
    <div class="controls">
      <button onclick="start()">开始</button>
      <button onclick="stop()">停止</button>
      <button onclick="reset()">重置</button>
    </div>
    <div class="meta">
      <p>设计：<a href="https://www.zhihu.com/people/wen-yan-zheng-15594312" target="_blank">wenyanzheng</a></p>
      <p>感谢使用</p>
    </div>
  </div>
  <script>
    const timer = document.getElementById('timer');
    const breakEl = document.getElementById('break');
    const sessionEl = document.getElementById('session');
    const countEl = document.getElementById('count');
    let isRunning = false;
    let time = 1500;
    let breakTime = 300;
    let sessionTime = 1500;
    let sessionCount = 0;

    function pad(n) {
      return n < 10 ? `0${n}` : n;
    }

    function formatTime(t) {
      const minutes = Math.floor(t / 60);
      const seconds = Math.floor(t % 60);
      return `${pad(minutes)}:${pad(seconds)}`;
    }

    function update() {
      const ms = time % 1000;
      const seconds = Math.floor((time / 1000) % 60);
      const minutes = Math.floor((time / 1000) / 60);
      const display = `${pad(minutes)}:${pad(seconds)}`;
      timer.textContent = display;
      if (display === '00:00') {
        isRunning = false;
        stop();
        if (minutes === 0 && seconds === 0) {
          sessionCount++;
          sessionEl.textContent = `工作时间：${formatTime(sessionTime)}`;
          breakTime = 5 * 60;
          breakEl.textContent = `休息时间：${formatTime(breakTime)}`;
          start();
        } else if (minutes === 25 && seconds === 0) {
          sessionTime = 25 * 60;
          sessionEl.textContent = `工作时间：${formatTime(sessionTime)}`;
          breakTime = 5 * 60;
          breakEl.textContent = `休息时间：${formatTime(breakTime)}`;
          start();
        }
      }
    }

    function start() {
      if (isRunning) return;
      isRunning = true;
      update();
      const interval = setInterval(() => {
        time--;
        update();
      }, 10);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) clearInterval(interval);
        else interval = setInterval(() => {
          time--;
          update();
        }, 10);
      });
    }

    function stop() {
      isRunning = false;
      clearInterval(interval);
      time = sessionTime;
      update();
    }

    function reset() {
      isRunning = false;
      clearInterval(interval);
      time = sessionTime;
      breakTime = 5 * 60;
      sessionTime = 25 * 60;
      sessionCount = 0;
      timer.textContent = '25:00';
      breakEl.textContent = '休息时间：5:00';
      sessionEl.textContent = '工作时间：25:00';
      countEl.textContent = '已工作：0';
    }

    document.addEventListener('DOMContentLoaded', () => {
      reset();
      document.getElementById('start').addEventListener('click', start);
      document.getElementById('stop').addEventListener('click', stop);
      document.getElementById('reset').addEventListener('click', reset);
    });
  </script>
</body>
</html>
