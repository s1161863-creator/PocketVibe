<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>游泳秒表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(135deg, #1473f0, #289cf0);
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      color: #243147;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.28);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 14px;
      text-align: center;
    }
    p.sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 14px;
      font-size: 14px;
    }
    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      margin-top: 10px;
    }
    input, select, textarea {
      padding: 13px 14px;
      background: #ffffff;
      color: #243147;
      border: 2px solid #dde4ee;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button {
      padding: 13px 14px;
      background: linear-gradient(135deg, #1473f0, #289cf0);
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .chip {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      font-size: 13px;
    }
    .result {
      font-size: 38px;
      font-weight: 800;
      text-align: center;
      margin-top: 16px;
      line-height: 1.2;
    }
    .panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
    }
    .small {
      font-size: 14px;
      color: #6b7280;
      margin-top: 8px;
      text-align: center;
    }
    ul {
      list-style: none;
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    li {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
    }
    .icon {
      margin-right: 8px;
      width: 16px;
      height: 16px;
      object-fit: contain;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .chip {
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>游泳秒表</h1>
    <p class="sub">湿手操作：字体要特别大（至少60px），按钮要特别大（至少80px高度），配色用防水风格的深蓝/浅蓝渐变，支持分段记录每一趟游泳的时间，显示总距离（按50米/趟估算）。</p>
    <input type="text" placeholder="输入距离（米）" class="input" value="50" id="distance">
    <div class="row">
      <input type="number" placeholder="开始时间（秒）" class="input" id="start-time">
      <button onclick="startStopwatch()">开始</button>
    </div>
    <div class="row">
      <input type="number" placeholder="结束时间（秒）" class="input" id="end-time">
      <button onclick="startStopwatch()">结束</button>
    </div>
    <div class="panel">
      <div class="result" id="time">00:00:00</div>
      <div class="small">总距离：00.00 米</div>
    </div>
    <ul class="chips" id="segments">
      <li class="chip">第一趟</li>
      <li class="chip">第二趟</li>
      <li class="chip">第三趟</li>
    </ul>
    <button onclick="reset()">重置</button>
  </div>
  <script>
    let startTime = 0;
    let endTime = 0;
    let time = 0;
    let segments = [];
    let currentSegment = 0;

    function startStopwatch() {
      if (startTime === 0) {
        startTime = new Date().getTime() / 1000;
        document.getElementById("start-time").value = startTime.toFixed(2);
        document.getElementById("end-time").value = "";
        updateDisplay();
        document.getElementById("segments").style.display = "block";
      } else {
        endTime = new Date().getTime() / 1000;
        time = endTime - startTime;
        updateDisplay();
        segments.push(time);
        currentSegment++;
        document.getElementById("segments").innerHTML = segments.map((segment, index) => `<li class="chip">${index + 1}趟：${segment.toFixed(2)} 秒</li>`).join("");
      }
    }

    function reset() {
      startTime = 0;
      endTime = 0;
      time = 0;
      segments = [];
      currentSegment = 0;
      document.getElementById("start-time").value = "";
      document.getElementById("end-time").value = "";
      document.getElementById("time").textContent = "00:00:00";
      document.getElementById("segments").style.display = "none";
      document.getElementById("segments").innerHTML = "";
      document.getElementById("result").textContent = "00.00 米";
    }

    function updateDisplay() {
      const minutes = Math.floor(time / 60);
      const seconds = Math.floor(time % 60);
      const milliseconds = Math.floor((time % 1) * 1000);
      const formattedTime = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}:${milliseconds.toString().padStart(3, "0")}`;
      document.getElementById("time").textContent = formattedTime;
      const totalDistance = segments.reduce((acc, segment) => acc + segment, 0) * 50;
      document.getElementById("result").textContent = `${totalDistance.toFixed(2)} 米`;
    }
  </script>
</body>
</html>
