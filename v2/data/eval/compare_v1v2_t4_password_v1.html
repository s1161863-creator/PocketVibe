<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>随机密码生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(135deg, #599bf4, #2477ee);
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      color: #243147;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.28);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 14px;
      text-align: center;
    }
    p.sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 14px;
      font-size: 14px;
    }
    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      margin-top: 10px;
    }
    input, select, textarea {
      padding: 13px 14px;
      background: #ffffff;
      color: #243147;
      border: 2px solid #dde4ee;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button {
      padding: 13px 14px;
      background: linear-gradient(135deg, #599bf4, #2477ee);
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .chip {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      font-size: 13px;
    }
    .result {
      font-size: 38px;
      font-weight: 800;
      text-align: center;
      margin-top: 16px;
      line-height: 1.2;
    }
    .panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
    }
    .small {
      font-size: 14px;
      color: #6b7280;
      margin-top: 8px;
      text-align: center;
    }
    ul {
      list-style: none;
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    li {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
    }
    .code {
      white-space: pre-wrap;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      margin-top: 8px;
      word-break: break-all;
    }
    ul li ul {
      margin-top: 8px;
    }
    ul li ul li {
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
    }
    ul li ul li code {
      white-space: normal;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>随机密码生成器</h1>
    <p class="sub">你可以调节密码的长度</p>
    <input type="number" id="length" min="8" max="32" value="16" placeholder="密码长度">
    <div class="row">
      <select id="lowercase" class="chips">
        <option value="on">包含小写字母</option>
        <option value="off">不包含小写字母</option>
      </select>
      <select id="uppercase" class="chips">
        <option value="on">包含大写字母</option>
        <option value="off">不包含大写字母</option>
      </select>
      <select id="numbers" class="chips">
        <option value="on">包含数字</option>
        <option value="off">不包含数字</option>
      </select>
      <select id="special" class="chips">
        <option value="on">包含特殊字符</option>
        <option value="off">不包含特殊字符</option>
      </select>
    </div>
    <button onclick="generatePassword()">生成密码</button>
    <div class="result" id="password"></div>
    <div class="panel">
      <h3>生成的密码</h3>
      <div class="small">点击“生成密码”按钮即可生成随机密码</div>
      <div class="code" id="generatedPassword"></div>
    </div>
    <ul class="small">
      <li>密码长度范围：8-32 位</li>
      <li>生成的密码不会包含任何敏感信息，如用户名、密码、信用卡号等</li>
    </ul>
  </div>
  <script>
    function generatePassword() {
      const length = document.getElementById("length").value;
      const lowercase = document.getElementById("lowercase").checked;
      const uppercase = document.getElementById("uppercase").checked;
      const numbers = document.getElementById("numbers").checked;
      const special = document.getElementById("special").checked;
      const charset = "";

      if (lowercase) charset += "abcdefghijklmnopqrstuvwxyz";
      if (uppercase) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (numbers) charset += "0123456789";
      if (special) charset += "!@#$%^&*()_+{}[]:;'<>,.?/|";

      if (charset.length === 0) {
        alert("请选择至少一种字符集");
        return;
      }

      const password = [];
      for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * charset.length);
        password.push(charset[randomIndex]);
      }

      const generatedPassword = password.join("");
      document.getElementById("generatedPassword").innerText = generatedPassword;
      document.getElementById("password").innerText = generatedPassword;
    }
  </script>
</body>
</html>
