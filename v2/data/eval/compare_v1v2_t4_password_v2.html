<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>随机密码生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(135deg, #243b55, #3b5b8b);
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #203245;
      padding: 18px;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.32);
    }
    h1 {
      color: #ffffff;
      margin-bottom: 12px;
      font-size: 24px;
      text-align: center;
    }
    p {
      color: #aaa;
      text-align: center;
      margin-bottom: 12px;
      font-size: 14px;
    }
    input, select, textarea, button {
      width: 100%;
      border: none;
      border-radius: 14px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.16);
      margin-top: 10px;
    }
    input, select, textarea {
      padding: 12px 14px;
      background: #28354c;
      color: #ffffff;
      font-size: 16px;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button {
      padding: 12px 14px;
      background: linear-gradient(135deg, #243b55, #3b5b8b);
      color: white;
      font-size: 16px;
      transition: all 0.3s;
    }
    .result {
      margin-top: 12px;
      font-size: 24px;
      color: #42b983;
      text-align: center;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 12px;
      text-align: center;
    }
    .form-group {
      display: grid;
      gap: 4px;
    }
    .form-check {
      display: grid;
      gap: 4px;
      align-items: start;
    }
    .form-check label {
      font-size: 14px;
      color: #6b7280;
      min-width: 90px;
    }
    .check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      display: grid;
      place-items: center;
      margin-right: 12px;
      transition: background 0.3s;
    }
    .yes .check, .no .check {
      background: #42b983;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .switch {
      position: relative;
      width: 48px;
      height: 24px;
      border-radius: 12px;
      background: #34495e;
      cursor: pointer;
      margin-top: 8px;
    }
    .slider {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      background: #28354c;
      transition: transform 0.3s;
    }
    .on {
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      transition: background 0.3s;
    }
    .row label {
      font-size: 14px;
      color: #6b7280;
      margin-left: 12px;
    }
    .row .switch {
      margin-left: auto;
    }
    .small {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 8px;
    }
    .privacy {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      text-align: center;
    }
    .privacy p {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      margin-left: 8px;
    }
    .privacy a {
      font-size: 14px;
      color: #28354c;
      text-decoration: underline;
      transition: color 0.3s;
    }
    footer {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }
    .feedback {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
      opacity: 0.72;
    }
    .legal {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      color: #aaa;
      opacity: 0.72;
    }
    .copy {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #34495e;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      transition: background 0.3s;
      z-index: 9999;
    }
    .copy i {
      font-size: 24px;
    }
    @media (max-width: 640px) {
      body, .card, h1, p, button, .result, textarea, .controls, .form-group, .form-check, .row, .switch, .privacy, footer, .feedback, .legal, .copy {
        padding: 12px;
      }
      .card {
        width: 100%;
        padding: 14px;
      }
      .small {
        font-size: 12px;
      }
      .privacy p, .legal p {
        font-size: 12px;
      }
      .copy {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>随机密码生成器</h1>
    <p>生成随机密码，可设置长度。</p>
    <input id="length" type="number" value="12" min="8" max="32" placeholder="密码长度">
    <button onclick="generatePassword()">生成密码</button>
    <div class="result" id="password"></div>
  </main>
  <script>
    function generatePassword() {
      const length = parseInt(document.getElementById('length').value);
      const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let password = '';
      for (let i = 0; i < length; i++) {
        password += charset.charAt(Math.floor(Math.random() * charset.length));
      }
      document.getElementById('password').textContent = password;
    }
  </script>
</body>
</html>
