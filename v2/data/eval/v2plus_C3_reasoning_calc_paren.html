<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>科学计算器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #40c9ff, #52c41a);
      color: white;
      padding: 20px;
      border-radius: 14px;
    }
    .container {
      background: white;
      padding: 22px;
      border-radius: 12px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.2);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 14px;
      text-align: center;
    }
    p {
      text-align: center;
      color: #6b7280;
      margin-bottom: 14px;
      font-size: 14px;
    }
    input {
      width: 100%;
      height: 48px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      padding: 0 14px;
      background: #fff;
      color: #243143;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 12px;
    }
    button {
      width: 100%;
      height: 48px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      padding: 0 14px;
      background: linear-gradient(135deg, #40c9ff, #52c41a);
      color: white;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.16);
    }
    .result {
      height: 48px;
      font-size: 38px;
      text-align: right;
      line-height: 48px;
      border-radius: 18px;
      padding: 0 22px;
      background: rgba(255, 255, 255, 0.16);
      margin-top: 12px;
    }
    .panel {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
    }
    .small {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      margin-top: 8px;
    }
    .back, .clear {
      width: calc(50% - 12px);
    }
    .back {
      margin-right: 12px;
    }
    .history {
      height: 100px;
      overflow-y: auto;
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.16);
      margin-top: 12px;
    }
    .history pre {
      font-family: "Courier New", "Courier", monospace;
      margin: 0;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
    }
    .code {
      white-space: pre-wrap;
      font-family: "Courier New", "Courier", monospace;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>科学计算器</h1>
    <input id="display" disabled readonly>
    <div class="row">
      <button id="back">←</button>
      <button id="clear" class="back">AC</button>
      <button>÷</button>
      <button>±</button>
    </div>
    <div class="row">
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button>x</button>
    </div>
    <div class="row">
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>-</button>
    </div>
    <div class="row">
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>+</button>
    </div>
    <div class="row">
      <button id="equals">等于</button>
    </div>
    <div class="small">输入表达式并点击“等于”按钮，查看结果。</div>
  </div>
  <script>
    const display = document.getElementById('display');
    const history = document.getElementById('history');
    const code = document.getElementById('code');
    const buttons = document.querySelectorAll('button');
    let input = '';

    for (const button of buttons) {
      button.addEventListener('click', () => {
        const value = button.textContent;
        if (value === 'AC') {
          input = '';
          display.value = '';
        } else if (value === '←') {
          input = input.slice(0, -1);
          display.value = input;
        } else if (value === '±') {
          input = input.startsWith('-') ? input.slice(1) : `-${input}`;
          display.value = input;
        } else if (value === '=') {
          try {
            input = Math.round(eval(input) * 100) / 100;
            display.value = input;
            history.value = `${input} = ${display.value}`;
            code.value = `eval("${input}")`;
          } catch (error) {
            display.value = '错误';
            history.value = `错误: ${error.message}`;
            code.value = `eval("${input}")`;
          }
        } else {
          input += value;
          display.value = input;
        }
      });
    }

    display.addEventListener('input', () => {
      const value = display.value;
      history.value = value;
      code.value = `eval("${value}")`;
    });
  </script>
</body>
</html>
