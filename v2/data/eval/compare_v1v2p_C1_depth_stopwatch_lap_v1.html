<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>分段秒表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      color: #243147;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.28);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 14px;
      text-align: center;
    }
    p.sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 14px;
      font-size: 14px;
    }
    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      margin-top: 10px;
    }
    input, select, textarea {
      padding: 13px 14px;
      background: #ffffff;
      color: #243147;
      border: 2px solid #dde4ee;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button {
      padding: 13px 14px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .chip {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      font-size: 13px;
    }
    .result {
      font-size: 38px;
      font-weight: 800;
      text-align: center;
      margin-top: 16px;
      line-height: 1.2;
    }
    .panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
    }
    .small {
      font-size: 14px;
      color: #6b7280;
      margin-top: 8px;
      text-align: center;
    }
    ul {
      list-style: none;
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    li {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
    }
    .run {
      margin-right: auto;
    }
    .time {
      font-size: 48px;
      font-weight: 700;
      color: #243147;
      text-align: center;
    }
    .segment {
      font-size: 16px;
      color: #6b7280;
      text-align: center;
      margin-top: 8px;
    }
    .control {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }
    .btn {
      flex: 1;
      padding: 13px 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    .primary {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
    }
    .secondary {
      background: #f6f9fa;
      color: #6b7280;
    }
    .reset {
      background: #f4f8f9;
      color: #6b7280;
      margin-left: 8px;
    }
    .start {
      background: #007bff;
      color: white;
    }
    .pause {
      background: #6c757d;
      color: white;
    }
    .clear {
      background: #dc3545;
      color: white;
    }
    .highlight {
      background: linear-gradient(90deg, #4856ff, #2196f3);
      color: white;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      margin-left: 8px;
    }
    .panel-result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
    }
    .result-item {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      display: flex;
      gap: 8px;
    }
    .result-time {
      font-size: 24px;
      font-weight: 700;
      color: #243147;
    }
    .result-segment {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
    }
    .panel-stats {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
    }
    .stats-item {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      display: flex;
      gap: 8px;
    }
    .stats-title {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 4px;
      text-align: center;
    }
    .stats-value {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>分段秒表</h1>
    <p class="sub">支持开始/暂停/清零三个操作；点击分段按钮可以记录当前圈速，最多保存10段；每段显示与上一段的差值；自动高亮最快段（绿色）和最慢段（红色）。</p>
    <div class="row">
      <input type="time" id="time-input" placeholder="请输入时间" />
      <button class="primary start" onclick="startTimer()">开始</button>
      <button class="secondary pause" onclick="pauseTimer()">暂停</button>
      <button class="reset clear" onclick="clearTimer()">清零</button>
    </div>
    <div class="result panel" id="resultPanel">
      <div class="time" id="timeDisplay">00:00:00</div>
      <div class="segment" id="segmentDisplay">00:00:00</div>
      <div class="run" id="runDisplay">00:00:00</div>
      <div class="segment" id="segmentDiffDisplay">00:00:00</div>
    </div>
    <div class="panel stats panel-stats" id="statsPanel">
      <div class="stats-title">最快段（绿色）</div>
      <div class="stats-value" id="fastestSegment">00:00:00</div>
      <div class="stats-title">最慢段（红色）</div>
      <div class="stats-value" id="slowestSegment">00:00:00</div>
    </div>
    <div class="chips panel" id="chipsPanel">
      <div class="chip" onclick="addSegment()">分段</div>
      <div class="chip" onclick="deleteSegment()">删除</div>
      <div class="chip" onclick="clearSegments()">清空</div>
    </div>
    <ul class="list panel" id="segmentsList">
      <li class="result-item" id="segment0">
        <div class="result-time" id="segment0Time">00:00:00</div>
        <div class="result-segment" id="segment0Segment">00:00:00</div>
      </li>
    </ul>
  </div>
  <script>
    let timerInterval;
    let segments = [];
    let currentSegmentIndex = 0;
    let fastestSegment = "00:00:00";
    let slowestSegment = "00:00:00";
    let timeInput = document.getElementById("time-input");
    let timeDisplay = document.getElementById("timeDisplay");
    let segmentDisplay = document.getElementById("segmentDisplay");
    let runDisplay = document.getElementById("runDisplay");
    let segmentDiffDisplay = document.getElementById("segmentDiffDisplay");
    let resultPanel = document.getElementById("resultPanel");
    let statsPanel = document.getElementById("statsPanel");
    let chipsPanel = document.getElementById("chipsPanel");
    let segmentsList = document.getElementById("segmentsList");
    let fastestSegmentElement = document.getElementById("fastestSegment");
    let slowestSegmentElement = document.getElementById("slowestSegment");

    function startTimer() {
      if (timerInterval) return;
      timerInterval = setInterval(() => {
        const time = new Date();
        const minutes = String(time.getMinutes()).padStart(2, "0");
        const seconds = String(time.getSeconds()).padStart(2, "0");
        const milliseconds = String(time.getMilliseconds()).padStart(3, "0");
        const formattedTime = `${minutes}:${seconds}.${milliseconds}`;
        timeDisplay.textContent = formattedTime;
        updateRunDisplay();
        updateSegmentDisplay();
        updateSegmentDiffDisplay();
      }, 10);
    }

    function pauseTimer() {
      if (!timerInterval) return;
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function clearTimer() {
      if (!timerInterval) return;
      clearInterval(timerInterval);
      timerInterval = null;
      timeInput.value = "";
      timeDisplay.textContent = "00:00:00";
      segmentDisplay.textContent = "00:00:00";
      runDisplay.textContent = "00:00:00";
      segmentDiffDisplay.textContent = "00:00:00";
      segments = [];
      currentSegmentIndex = 0;
      fastestSegment = "00:00:00";
      slowestSegment = "00:00:00";
      updateChipsPanel();
      updateStatsPanel();
    }

    function updateRunDisplay() {
      const time = new Date();
      const minutes = String(time.getMinutes()).padStart(2, "0");
      const seconds = String(time.getSeconds()).padStart(2, "0");
      const formattedTime = `${minutes}:${seconds}`;
      runDisplay.textContent = formattedTime;
    }

    function updateSegmentDisplay() {
      const time = new Date();
      const minutes = String(time.getMinutes()).padStart(2, "0");
      const seconds = String(time.getSeconds()).padStart(2, "0");
      const formattedTime = `${minutes}:${seconds}`;
      segmentDisplay.textContent = formattedTime;
    }

    function updateSegmentDiffDisplay() {
      const time = new Date();
      const minutes = String(time.getMinutes()).padStart(2, "0");
      const seconds = String(time.getSeconds()).padStart(2, "0");
      const formattedTime = `${minutes}:${seconds}`;
      segmentDiffDisplay.textContent = formattedTime;
    }

    function updateChipsPanel() {
      chipsPanel.innerHTML = "";
      segments.forEach((segment, index) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = `分段 ${index + 1}`;
        chipsPanel.appendChild(chip);
      });
    }

    function updateStatsPanel() {
      statsPanel.innerHTML = "";
      const fastestSegmentElement = document.getElementById("fastestSegment");
      const slowestSegmentElement = document.getElementById("slowestSegment");
      fastestSegmentElement.textContent = fastestSegment;
      slowestSegmentElement.textContent = slowestSegment;
    }

    function addSegment() {
      const time = new Date();
      const minutes = String(time.getMinutes()).padStart(2, "0");
      const seconds = String(time.getSeconds()).padStart(2, "0");
      const formattedTime = `${minutes}:${seconds}`;
      const segment = document.createElement("div");
      segment.className = "result-item";
      segmentTime.textContent = formattedTime;
      segmentSegment.textContent = "00:00:00";
      segmentsList.appendChild(segment);
      updateSegmentsList();
      updateStatsPanel();
    }

    function deleteSegment() {
      if (segments.length === 1) return;
      segmentsList.removeChild(segmentsList.lastChild);
      segments.pop();
      updateSegmentsList();
      updateStatsPanel();
    }

    function clearSegments() {
      segmentsList.innerHTML = "";
      segments = [];
      currentSegmentIndex = 0;
      updateChipsPanel();
      updateStatsPanel();
    }

    function updateSegmentsList() {
      segmentsList.innerHTML = "";
      segments.forEach((segment, index) => {
        const segmentElement = document.createElement("div");
        segmentElement.className = "result-item";
        segmentTime.textContent = segment;
        segmentSegment.textContent = "00:00:00";
        segmentsList.appendChild(segmentElement);
      });
    }

    function calculateDifference(previousTime, currentTime) {
      const previousTimeArray = previousTime.split(":");
      const currentTimeArray = currentTime.split(":");
      const minutes = parseInt(currentTimeArray[0]) - parseInt(previousTimeArray[0]);
      const seconds = parseInt(currentTimeArray[1]) - parseInt(previousTimeArray[1]);
      const milliseconds = parseInt(currentTimeArray[2]) - parseInt(previousTimeArray[2]);
      if (milliseconds < 0) {
        milliseconds += 1000;
        seconds--;
      }
      if (seconds < 0) {
        seconds += 60;
        minutes--;
      }
      return `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}:${milliseconds.toString().padStart(3, "0")}`;
    }

    function updateSegmentDiffDisplay() {
      if (segments.length < 2) {
        segmentDiffDisplay.textContent = "00:00:00";
        return;
      }
      const previousTime = segments[currentSegmentIndex - 1];
      const currentTime = segments[currentSegmentIndex];
      const difference = calculateDifference(previousTime, currentTime);
      segmentDiffDisplay.textContent = difference;
    }

    function updateFastestSegment() {
      if (segments.length === 0) {
        fastestSegmentElement.textContent = "00:00:00";
        return;
      }
      let fastestTime = segments[0];
      for (let i = 1; i < segments.length; i++) {
        if (new Date(segments[i]).getTime() < new Date(fastestTime).getTime()) {
          fastestTime = segments[i];
        }
      }
      fastestSegmentElement.textContent = fastestTime;
    }

    function updateSlowestSegment() {
      if (segments.length === 0) {
        slowestSegmentElement.textContent = "00:00:00";
        return;
      }
      let slowestTime = segments[0];
      for (let i = 1; i < segments.length; i++) {
        if (new Date(segments[i]).getTime() > new Date(slowestTime).getTime()) {
          slowestTime = segments[i];
        }
      }
      slowestSegmentElement.textContent = slowestTime;
    }

    timeInput.addEventListener("input", (event) => {
      const time = event.target.value;
      const minutes = time.split(":")[0];
      const seconds = time.split(":")[1];
      const formattedTime = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
      timeDisplay.textContent = formattedTime;
      updateRunDisplay();
      updateSegmentDisplay();
      updateSegmentDiffDisplay();
    });

    document.addEventListener("DOMContentLoaded", () => {
      updateChipsPanel();
      updateStatsPanel();
      updateFastestSegment();
      updateSlowestSegment();
    });
  </script>
</body>
</html>
