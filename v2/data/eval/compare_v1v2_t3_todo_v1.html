<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>待办事项</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(135deg, #f78c6e, #f7c73c);
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      color: #243147;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.28);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 14px;
      text-align: center;
    }
    p.sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 14px;
      font-size: 14px;
    }
    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      margin-top: 10px;
    }
    input, select, textarea {
      padding: 13px 14px;
      background: #ffffff;
      color: #243147;
      border: 2px solid #dde4ee;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button {
      padding: 13px 14px;
      background: linear-gradient(135deg, #f78c6e, #f7c73c);
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .chip {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      font-size: 13px;
    }
    .result {
      font-size: 38px;
      font-weight: 800;
      text-align: center;
      margin-top: 16px;
      line-height: 1.2;
    }
    .panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
    }
    .small {
      font-size: 14px;
      color: #6b7280;
      margin-top: 8px;
      text-align: center;
    }
    ul {
      list-style: none;
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    li {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
    }
    .check {
      margin-right: 10px;
      transform: scale(1.8);
    }
    .task {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .delete {
      font-size: 14px;
      color: #243147;
      cursor: pointer;
    }
    button.check {
      background: linear-gradient(135deg, #f78c6e, #f7c73c);
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>待办事项</h1>
    <p class="sub">添加、删除、勾选待办事项</p>
    <input 
      type="text" 
      id="task" 
      placeholder="添加待办事项" 
      autocomplete="off" 
      autofocus 
    >
    <div class="row">
      <select id="priority">
        <option value="high">高</option>
        <option value="medium">中</option>
        <option value="low">低</option>
      </select>
      <button id="add">添加</button>
    </div>
    <div class="panel">
      <h2>待办事项</h2>
      <ul id="todos">
        <!-- 待办事项列表将在这里显示 -->
      </ul>
      <p class="small">点击任务进行勾选和删除</p>
    </div>
  </div>
  <script>
    // 获取DOM元素
    const taskInput = document.getElementById('task');
    const prioritySelect = document.getElementById('priority');
    const addButton = document.getElementById('add');
    const todoList = document.getElementById('todos');
    const resultDisplay = document.getElementById('result');
    const chipContainer = document.querySelector('.chips');
    const chipList = [];

    // 清除输入框和优先级选择器
    function clearInput() {
      taskInput.value = '';
      prioritySelect.value = 'high';
    }

    // 更新结果显示
    function updateResult() {
      resultDisplay.textContent = chipList.length > 0 ? chipList.join(', ') : '无';
    }

    // 添加任务到列表
    function addTodo(task, priority) {
      const todoItem = document.createElement('li');
      todoItem.className = 'task';
      todoItem.textContent = task;
      todoItem.dataset.priority = priority;

      // 添加勾选和删除按钮
      const checkButton = document.createElement('button');
      checkButton.className = 'check';
      checkButton.textContent = '√';
      checkButton.addEventListener('click', () => {
        todoItem.classList.toggle('checked');
        updateChipList();
      });

      const deleteButton = document.createElement('button');
      deleteButton.className = 'delete';
      deleteButton.textContent = '×';
      deleteButton.addEventListener('click', () => {
        todoList.removeChild(todoItem);
        chipList = chipList.filter(chip => chip !== task);
        updateChipList();
      });

      todoItem.appendChild(checkButton);
      todoItem.appendChild(deleteButton);
      todoList.appendChild(todoItem);

      updateChipList();
    }

    // 更新标签芯片
    function updateChipList() {
      chipContainer.innerHTML = '';
      chipList = chipList.filter(chip => chip !== resultDisplay.textContent);

      chipList.forEach(task => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.textContent = task;
        chipContainer.appendChild(chip);
      });

      updateResult();
    }

    // 处理添加任务按钮点击事件
    addButton.addEventListener('click', () => {
      const task = taskInput.value;
      const priority = prioritySelect.value;

      if (task.trim() === '') {
        alert('请输入待办事项');
        return;
      }

      addTodo(task, priority);
      clearInput();
    });

    // 处理任务点击事件
    todoList.addEventListener('click', (event) => {
      if (event.target.classList.contains('task')) {
        const task = event.target.textContent;
        chipList.push(task);
        updateChipList();
      }
    });
  </script>
</body>
</html>
