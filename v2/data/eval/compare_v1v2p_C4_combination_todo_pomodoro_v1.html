<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>番茄待办</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(135deg, #00b09b, #96c93d);
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      color: #243147;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.28);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 14px;
      text-align: center;
    }
    p.sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 14px;
      font-size: 14px;
    }
    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      margin-top: 10px;
    }
    input, select, textarea {
      padding: 13px 14px;
      background: #ffffff;
      color: #243147;
      border: 2px solid #dde4ee;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button {
      padding: 13px 14px;
      background: linear-gradient(135deg, #00b09b, #96c93d);
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .chip {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      font-size: 13px;
    }
    .result {
      font-size: 38px;
      font-weight: 800;
      text-align: center;
      margin-top: 16px;
      line-height: 1.2;
    }
    .panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
    }
    .small {
      font-size: 14px;
      color: #6b7280;
      margin-top: 8px;
      text-align: center;
    }
    ul {
      list-style: none;
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    li {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
    }
    .check {
      margin-right: 10px;
      color: #243147;
    }
    .task {
      flex: 1;
      font-size: 18px;
      font-weight: 500;
    }
    .delete {
      font-size: 16px;
      color: #6b7280;
      padding-left: 12px;
    }
    .progress {
      margin-top: 8px;
      display: flex;
      align-items: center;
    }
    .bar {
      flex: 1;
      border-radius: 999px;
      background: #f5f7fa;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      background: linear-gradient(90deg, #28a745, #2196f3);
    }
    .time {
      font-size: 38px;
      font-weight: 800;
      text-align: center;
      margin-top: 8px;
      line-height: 1.2;
    }
    .button-row {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .button {
      flex: 1;
      padding: 14px;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }
    .start {
      background: linear-gradient(135deg, #00b09b, #96c93d);
      color: white;
    }
    .reset {
      background: #f8f9fa;
      color: #6b7280;
    }
    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>番茄待办</h1>
    <p class="sub">上半部分是待办列表，可以添加/勾选/删除任务；点击任意待办项旁边的▶按钮，下半部分的番茄钟就自动以该任务名启动25分钟倒计时；倒计时结束后自动把对应待办标记为完成。</p>
    <input 
      type="text" 
      id="task" 
      placeholder="添加任务" 
      autocomplete="off"
      style="margin-bottom: 14px;"
    >
    <button id="add-task">添加</button>
    <div class="row">
      <button id="start-timer" disabled>开始</button>
      <button id="reset-timer" class="reset">重置</button>
    </div>
    <div class="panel">
      <div class="result" id="timer-title">开始番茄钟</div>
      <div class="progress">
        <div class="bar"></div>
      </div>
      <div class="time" id="timer-countdown">00:25</div>
      <div class="small">倒计时结束自动标记为完成</div>
    </div>
    <ul id="tasks-list">
      <li class="task check" data-todo="待完成">
        <span class="check">✓</span>待完成
      </li>
    </ul>
  </div>

  <script>
    const timerTitle = document.getElementById('timer-title');
    const timerCountdown = document.getElementById('timer-countdown');
    const tasksList = document.getElementById('tasks-list');
    const startTimerButton = document.getElementById('start-timer');
    const resetTimerButton = document.getElementById('reset-timer');
    const addTaskInput = document.getElementById('task');
    const addTaskButton = document.getElementById('add-task');

    let timerId = null;
    let currentTask = null;
    let minutes = 25;

    function updateTimer() {
      const minutesLeft = Math.floor(minutes % 60);
      const secondsLeft = Math.floor((minutes % 60) * 10) % 10;
      timerCountdown.textContent = `${minutesLeft < 10 ? '0' : ''}${minutesLeft}:${secondsLeft < 10 ? '0' : ''}${secondsLeft}`;
    }

    function startTimer() {
      timerId = setInterval(() => {
        minutes--;
        updateTimer();
        if (minutes <= 0) {
          endTimer();
        }
      }, 1000);
      startTimerButton.disabled = true;
      resetTimerButton.classList.remove('reset');
      timerTitle.textContent = `番茄 ${currentTask} 倒计时`;
    }

    function endTimer() {
      clearInterval(timerId);
      startTimerButton.disabled = false;
      resetTimerButton.classList.add('reset');
      timerTitle.textContent = '开始番茄钟';
      updateTimer();
      const taskElement = tasksList.querySelector(`[data-todo="${currentTask}"]`);
      taskElement.classList.add('check');
      taskElement.classList.remove('task');
      taskElement.textContent = `${currentTask} 完成`;
      taskElement.style.color = '#28a745';
    }

    function resetTimer() {
      minutes = 25;
      updateTimer();
      startTimerButton.disabled = false;
      resetTimerButton.classList.remove('reset');
      timerTitle.textContent = '开始番茄钟';
      tasksList.querySelectorAll('.task').forEach((task) => {
        task.classList.remove('check');
        task.classList.add('task');
        task.textContent = task.dataset.todo;
        task.style.color = '#243147';
      });
      currentTask = null;
    }

    addTaskButton.addEventListener('click', () => {
      const task = addTaskInput.value.trim();
      if (task) {
        const newTask = document.createElement('li');
        newTask.classList.add('task', 'check');
        newTask.dataset.todo = task;
        newTask.textContent = `✓ ${task}`;
        newTask.style.color = '#28a745';
        tasksList.appendChild(newTask);
        addTaskInput.value = '';
        addTaskInput.focus();
      }
    });

    tasksList.addEventListener('click', (event) => {
      if (event.target.classList.contains('task')) {
        const taskElement = event.target;
        const task = taskElement.textContent.split(' ')[1];
        if (taskElement.classList.contains('check')) {
          taskElement.classList.remove('check');
          taskElement.classList.add('task');
          taskElement.textContent = task;
          taskElement.style.color = '#243147';
          currentTask = null;
        } else {
          taskElement.classList.remove('task');
          taskElement.classList.add('check');
          taskElement.textContent = `✓ ${task}`;
          taskElement.style.color = '#28a745';
          currentTask = task;
        }
      }
    });

    startTimerButton.addEventListener('click', () => {
      if (currentTask) {
        startTimer();
      } else {
        alert('请选择一个任务开始番茄钟！');
      }
    });

    resetTimerButton.addEventListener('click', () => {
      resetTimer();
    });
  </script>
</body>
</html>
