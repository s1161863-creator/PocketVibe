<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PocketVibe · AI 手机微应用生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);color:#333}

/* ===== 顶部标题栏 ===== */
.topbar{height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 24px;box-shadow:0 2px 12px rgba(0,0,0,.08);z-index:10;position:relative}
.topbar .logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar .sub{margin-left:12px;font-size:13px;color:#888}
.topbar .spacer{flex:1}
.topbar .badge{background:#f0eeff;color:#667eea;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600;margin-right:8px}
.topbar .hist-btn{background:#f5f5f7;border:none;padding:8px 14px;border-radius:10px;font-size:13px;cursor:pointer;color:#333}
.topbar .hist-btn:hover{background:#e8e8ee}

/* ===== 双栏布局 ===== */
.workspace{height:calc(100vh - 56px);display:flex;gap:0}

/* ----- 左栏：对话 ----- */
.chat-col{flex:1;min-width:0;display:flex;flex-direction:column;background:rgba(255,255,255,.92);backdrop-filter:blur(10px)}
.chat-header{padding:16px 24px 8px;border-bottom:1px solid #eee}
.chat-header h2{font-size:15px;color:#333;margin-bottom:2px}
.chat-header p{font-size:12px;color:#888}

.chat{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:12px}
.chat::-webkit-scrollbar{width:6px}
.chat::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}

.msg{max-width:88%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#f5f5f7;color:#333;border-bottom-left-radius:4px}
.msg.system{align-self:center;background:#eef2ff;color:#6366f1;font-size:12px;padding:6px 14px;border-radius:12px}

.examples-wrap{padding:8px 0}
.examples-wrap.hidden{display:none}
.examples-hint{font-size:12px;color:#888;margin-bottom:8px;text-align:center}
.examples{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ex-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border:1px solid #eee;border-radius:10px;cursor:pointer;transition:all .15s;font-size:13px;color:#333}
.ex-item:hover{border-color:#667eea;background:#f8f7ff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.15)}
.ex-icon{font-size:16px;flex-shrink:0}
.ex-text{flex:1;line-height:1.35}

/* 卡片样式（已生成提示卡） */
.bot-card{align-self:flex-start;max-width:88%;background:#fff;border:1px solid #e0e0ea;border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:center;animation:fadeIn .3s}
.bot-card .ic{font-size:24px}
.bot-card .t{flex:1}
.bot-card .t1{font-size:14px;font-weight:600;color:#333}
.bot-card .t2{font-size:12px;color:#888;margin-top:2px}
.bot-card button{padding:6px 12px;border:none;border-radius:10px;background:#f0eeff;color:#667eea;font-size:12px;cursor:pointer}
.bot-card button:hover{background:#e4ddff}

.loading-dots{display:inline-flex;gap:4px;vertical-align:middle;margin-right:6px}
.loading-dots span{width:6px;height:6px;background:#667eea;border-radius:50%;animation:bounce .6s infinite alternate}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}

/* ----- 输入区 ----- */
.input-area{padding:14px 24px 20px;border-top:1px solid #eee;background:#fff;flex-shrink:0}
.input-row{display:flex;gap:8px}
.input-row textarea{flex:1;padding:12px 14px;border:2px solid #e8e8f0;border-radius:14px;font-size:14px;outline:none;resize:none;height:48px;font-family:inherit;transition:border .2s;line-height:1.4}
.input-row textarea:focus{border-color:#667eea}
.send-btn{padding:0 20px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:14px;font-weight:600;cursor:pointer;min-width:80px}
.send-btn:hover{filter:brightness(1.08)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-hint{font-size:11px;color:#aaa;margin-top:6px;text-align:center}

/* ----- 右栏：手机预览 ----- */
.preview-col{width:480px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:transparent;position:relative}
.preview-col .label{color:#fff;font-size:13px;margin-bottom:12px;opacity:.85;font-weight:500}

.phone{width:375px;height:667px;border-radius:42px;border:8px solid #1a1a2e;box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 0 0 2px #333;overflow:hidden;background:#000;position:relative;flex-shrink:0}
.phone .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:140px;height:24px;background:#1a1a2e;border-radius:0 0 16px 16px;z-index:5;pointer-events:none}
.phone .hbar{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:110px;height:4px;background:rgba(255,255,255,.35);border-radius:2px;z-index:5;pointer-events:none}
.phone iframe{width:100%;height:100%;border:none;background:#fff;display:block}

.phone-empty{width:100%;height:100%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#bbb;padding:40px 20px;text-align:center}
.phone-empty .big{font-size:64px;margin-bottom:16px;opacity:.4}
.phone-empty .hint{font-size:14px;line-height:1.6}
.phone-empty .sub{font-size:12px;color:#ccc;margin-top:8px}

.phone-actions{margin-top:18px;display:flex;gap:8px;opacity:0;pointer-events:none;transition:opacity .3s}
.phone-actions.show{opacity:1;pointer-events:auto}
.phone-actions button{padding:8px 14px;border:none;border-radius:10px;font-size:13px;cursor:pointer;background:rgba(255,255,255,.92);color:#333;backdrop-filter:blur(8px);font-weight:500}
.phone-actions button:hover{background:#fff;transform:translateY(-1px)}

/* ===== 历史抽屉 ===== */
.hist-overlay{position:fixed;inset:0;z-index:100;display:none}
.hist-overlay.show{display:block}
.hist-bg{position:absolute;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px)}
.hist-panel{position:absolute;right:0;top:0;bottom:0;width:360px;background:#fff;box-shadow:-10px 0 40px rgba(0,0,0,.2);overflow-y:auto;padding:24px;animation:slideIn .3s}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.hist-panel h2{font-size:18px;margin-bottom:16px;color:#333}
.hist-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:24px;cursor:pointer;color:#999}
.hist-item{padding:12px;margin:8px 0;background:#f8f8ff;border-radius:10px;border-left:3px solid #667eea;cursor:pointer;transition:all .15s}
.hist-item:hover{background:#ece8ff;transform:translateX(-2px)}
.hist-item .ht{font-size:13px;font-weight:600;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-item .hm{font-size:11px;color:#999;margin-top:4px}
.hist-empty{text-align:center;color:#bbb;padding:40px 0;font-size:13px}

/* ===== 响应式 ===== */
@media (max-width: 1100px) {
  .preview-col{width:420px;padding:20px}
  .phone{width:335px;height:600px}
}
@media (max-width: 900px) {
  .workspace{flex-direction:column;height:auto;overflow-y:auto}
  .chat-col{height:50vh}
  .preview-col{width:100%;padding:24px}
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <span class="logo">📱 PocketVibe</span>
  <span class="sub">AI 手机微应用生成器</span>
  <span class="spacer"></span>
  <span class="badge">Qwen2.5-Coder + QLoRA</span>
  <button class="hist-btn" onclick="toggleHistory()">📋 历史记录</button>
</div>

<!-- 工作区 -->
<div class="workspace">

  <!-- ==== 左栏：对话 ==== -->
  <div class="chat-col">
    <div class="chat-header">
      <h2>💬 对话</h2>
      <p>用自然语言描述你想要的小工具，AI 会实时在右侧生成</p>
    </div>

    <div class="chat" id="chat">
      <div class="msg system">👋 你好！试试点击下面的示例，或直接输入需求</div>

      <div class="examples-wrap" id="examplesWrap">
        <div class="examples-hint">💡 推荐示例（点击即用）</div>
        <div class="examples" id="examples"></div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" placeholder="例如：做一个倒计时器，可以设定分钟数..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">生成 →</button>
      </div>
      <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
    </div>
  </div>

  <!-- ==== 右栏：手机预览 ==== -->
  <div class="preview-col">
    <div class="label">📱 实时预览（真实可交互）</div>
    <div class="phone" id="phone">
      <div class="notch"></div>
      <div class="hbar"></div>
      <div class="phone-empty" id="phoneEmpty">
        <div class="big">📱</div>
        <div class="hint">你生成的 App 会出现在这里</div>
        <div class="sub">可以直接在手机界面上点击交互</div>
      </div>
    </div>
    <div class="phone-actions" id="phoneActions">
      <button onclick="copyCode()">📋 复制代码</button>
      <button onclick="openInNewTab()">🔗 在新标签打开</button>
    </div>
  </div>

</div>

<!-- 历史抽屉 -->
<div class="hist-overlay" id="histOverlay">
  <div class="hist-bg" onclick="toggleHistory()"></div>
  <div class="hist-panel">
    <button class="hist-close" onclick="toggleHistory()">×</button>
    <h2>📋 历史记录</h2>
    <div id="histList"><div class="hist-empty">暂无记录</div></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   PocketVibe v7 · 桌面双栏布局
   ══════════════════════════════════════ */

var API = window.location.origin + '/generate';
var chat = document.getElementById('chat');
var inputEl = document.getElementById('input');
var sendBtn = document.getElementById('sendBtn');
var examplesWrap = document.getElementById('examplesWrap');
var examplesEl = document.getElementById('examples');
var phoneEl = document.getElementById('phone');
var phoneEmpty = document.getElementById('phoneEmpty');
var phoneActions = document.getElementById('phoneActions');

var currentHtml = '';
var currentInstruction = '';

var EXAMPLES = [
  {icon:'🍅', text:'做一个番茄钟，25分钟工作5分钟休息，自动轮次切换'},
  {icon:'⏱️', text:'做一个倒计时器，可以设定分钟数，有开始暂停和重置按钮'},
  {icon:'🧮', text:'做个简单的计算器，加减乘除'},
  {icon:'✅', text:'做一个待办事项列表，可以添加勾选和删除'},
  {icon:'🎯', text:'做个猜数字游戏，1到100之间猜'},
  {icon:'💰', text:'做一个简易记账本，可以记收入和支出'},
  {icon:'🔐', text:'做一个随机密码生成器'},
  {icon:'🎲', text:'做一个掷骰子工具，点击按钮随机出1到6的点数'},
  {icon:'📅', text:'做一个倒数日工具，输入日期显示还有几天'},
  {icon:'🎨', text:'做个随机颜色生成器'},
];

var historyData = [];
try { historyData = JSON.parse(localStorage.getItem('pv_history_v7') || '[]'); } catch(e) { historyData = []; }

// ===== 滚动 =====
function scrollChat() { chat.scrollTop = chat.scrollHeight + 999; }

// ===== 示例 =====
function renderExamples() {
  var html = '';
  for (var i = 0; i < EXAMPLES.length; i++) {
    html += '<div class="ex-item" data-idx="' + i + '">'
      + '<span class="ex-icon">' + EXAMPLES[i].icon + '</span>'
      + '<span class="ex-text">' + EXAMPLES[i].text + '</span></div>';
  }
  examplesEl.innerHTML = html;
  examplesEl.onclick = function(ev) {
    var item = ev.target.closest('.ex-item');
    if (item) {
      var idx = parseInt(item.getAttribute('data-idx'));
      inputEl.value = EXAMPLES[idx].text;
      send();
    }
  };
}

function hideExamples() { examplesWrap.classList.add('hidden'); }

// ===== 消息 =====
function addMsg(type, text) {
  var div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  chat.appendChild(div);
  scrollChat();
}

function addBotCard(instruction) {
  var div = document.createElement('div');
  div.className = 'bot-card';
  div.innerHTML = '<div class="ic">✨</div>'
    + '<div class="t"><div class="t1">已生成</div>'
    + '<div class="t2">' + instruction.substring(0, 30) + (instruction.length > 30 ? '...' : '') + '</div></div>'
    + '<button onclick="regenerate(\'' + encodeURIComponent(instruction) + '\')">🔄 重做</button>';
  chat.appendChild(div);
  scrollChat();
}

var loadingId = null;
function addLoading() {
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'loadingMsg';
  div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>正在生成 App...';
  chat.appendChild(div);
  scrollChat();
}
function removeLoading() {
  var el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

// ===== 手机预览 =====
function renderPhone(htmlCode) {
  // 清空原内容（保留 notch / hbar）
  phoneEl.innerHTML = '<div class="notch"></div><div class="hbar"></div>';

  var iframe = document.createElement('iframe');
  // 关键：不加 sandbox 属性！让 iframe 内的 JS 和事件正常运行
  // 用 srcdoc 直接嵌入 HTML
  iframe.srcdoc = htmlCode;
  phoneEl.appendChild(iframe);

  phoneActions.classList.add('show');
}

function clearPhone() {
  phoneEl.innerHTML = '<div class="notch"></div><div class="hbar"></div>';
  phoneEl.appendChild(phoneEmpty);
  phoneActions.classList.remove('show');
}

// ===== 发送 =====
function send(overrideText) {
  var text = (overrideText || inputEl.value || '').trim();
  if (!text) return;

  inputEl.value = '';
  sendBtn.disabled = true;
  hideExamples();
  addMsg('user', text);
  currentInstruction = text;
  addLoading();

  var abortCtrl = new AbortController();
  var abortTimer = setTimeout(function() { abortCtrl.abort(); }, 120000);

  fetch(API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({instruction: text, max_tokens: 4000}),
    signal: abortCtrl.signal
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    clearTimeout(abortTimer);
    removeLoading();
    if (data.html && (data.html.indexOf('<!DOCTYPE') !== -1 || data.html.indexOf('<html') !== -1)) {
      currentHtml = data.html;
      renderPhone(data.html);
      addBotCard(text);

      historyData.unshift({
        instruction: text,
        html: data.html,
        time: new Date().toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
        chars: data.char_count || data.html.length
      });
      if (historyData.length > 30) historyData.pop();
      try { localStorage.setItem('pv_history_v7', JSON.stringify(historyData)); } catch(e) {}
      renderHistory();
    } else {
      addMsg('bot', '⚠️ 生成结果不完整，请尝试更具体的描述');
    }
    sendBtn.disabled = false;
    inputEl.focus();
  })
  .catch(function(e) {
    clearTimeout(abortTimer);
    removeLoading();
    if (e.name === 'AbortError') {
      addMsg('bot', '⏱️ 请求超时(>120s)，请简化描述重试');
    } else {
      addMsg('bot', '❌ 连接失败: ' + e.message);
    }
    sendBtn.disabled = false;
  });
}

function regenerate(encInst) {
  var inst = decodeURIComponent(encInst);
  send(inst);
}

// ===== 操作按钮 =====
function copyCode() {
  if (!currentHtml) return;
  navigator.clipboard.writeText(currentHtml).then(function() {
    var btns = phoneActions.querySelectorAll('button');
    var orig = btns[0].textContent;
    btns[0].textContent = '✅ 已复制';
    setTimeout(function() { btns[0].textContent = orig; }, 1500);
  });
}

function openInNewTab() {
  if (!currentHtml) return;
  var blob = new Blob([currentHtml], {type:'text/html'});
  var url = URL.createObjectURL(blob);
  window.open(url, '_blank');
  setTimeout(function() { URL.revokeObjectURL(url); }, 60000);
}

// ===== 历史 =====
function toggleHistory() { document.getElementById('histOverlay').classList.toggle('show'); }

function renderHistory() {
  var el = document.getElementById('histList');
  if (!historyData.length) {
    el.innerHTML = '<div class="hist-empty">暂无记录</div>';
    return;
  }
  var html = '';
  var max = Math.min(historyData.length, 30);
  for (var i = 0; i < max; i++) {
    var h = historyData[i];
    html += '<div class="hist-item" data-idx="' + i + '">'
      + '<div class="ht">' + h.instruction + '</div>'
      + '<div class="hm">' + h.time + ' · ' + (h.chars||0).toLocaleString() + ' 字符</div></div>';
  }
  el.innerHTML = html;
  el.onclick = function(ev) {
    var item = ev.target.closest('.hist-item');
    if (item) {
      var idx = parseInt(item.getAttribute('data-idx'));
      loadHistory(idx);
    }
  };
}

function loadHistory(idx) {
  var h = historyData[idx];
  if (!h) return;
  toggleHistory();
  currentHtml = h.html;
  currentInstruction = h.instruction;
  renderPhone(h.html);
  addMsg('system', '📋 已从历史记录加载：' + h.instruction.substring(0, 20));
}

// ===== Init =====
renderExamples();
renderHistory();
</script>
</body>
</html>
